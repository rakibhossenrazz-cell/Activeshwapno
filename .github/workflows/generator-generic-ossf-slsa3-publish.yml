        :root { --p: #6366f1; --a: #22d3ee; --bg: #020617; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: var(--bg); color: #fff; line-height: 1.5; }
        
        header { padding: 15px 5%; background: #0f172a; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; border-bottom: 1px solid #334155; }
        .logo { font-weight: bold; color: var(--a); font-size: 20px; }
        .btn { padding: 8px 15px; border-radius: 5px; cursor: pointer; border: none; font-weight: bold; font-size: 12px; }
        .login-btn { background: #334155; color: white; margin-right: 5px; }
        .reg-btn { background: var(--p); color: white; }

        .hero { padding: 80px 5%; text-align: center; }
        .hero h1 { font-size: 32px; margin-bottom: 10px; }
        .hero h2 { font-size: 20px; color: var(--a); margin-top: 20px; }

        /* পপআপ ডিজাইন */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal.active { display: flex; }
        .form-box { background: #1e293b; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; border: 1px solid var(--a); }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; outline: none; }
        .sub-btn { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* প্রোফাইল কার্ড */
        #profile { display: none; background: #1e293b; padding: 20px; border-radius: 10px; border: 1px solid var(--a); margin-top: 30px; text-align: left; }
        .profile-title { color: var(--a); font-weight: bold; border-bottom: 1px solid #334155; padding-bottom: 5px; margin-bottom: 10px; }

        footer { padding: 40px 5%; background: #0f172a; text-align: center; font-size: 12px; color: #94a3b8; margin-top: 50px; }
    </style>
</head>
