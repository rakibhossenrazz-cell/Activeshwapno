    <!-- লগইন পপআপ -->
    <div class="modal" id="lModal">
        <div class="form-box">
            <h3 style="margin-bottom:10px">Login</h3>
            <input type="tel" placeholder="Mobile Number">
            <input type="password" placeholder="Password">
            <button class="sub-btn" onclick="alert('Login system coming soon!')">LOGIN</button>
            <button onclick="closeM()" style="background:none; color:gray; border:none; margin-top:10px; width:100%; cursor:pointer;">Close</button>
        </div>
    </div>

    <!-- রেজিস্ট্রেশন পপআপ -->
    <div class="modal" id="rModal">
        <div class="form-box">
            <h3 style="margin-bottom:10px">Registration</h3>
            <form id="regForm">
                <input type="text" name="name" id="inName" placeholder="Full Name" required>
                <input type="tel" name="phone" id="inPhone" placeholder="Mobile Number" required>
                <input type="number from=""" name="nid" placeholder="NID Number" required>
                <input type="number" name="age" id="inAge" placeholder="Age" required>
                <input type="password" name="password" placeholder="Set Password" required>
                <button type="submit" class="sub-btn" id="sBtn">SUBMIT PROFILE</button>
            </form>
            <button onclick="closeM()" style="background:none; color:gray; border:none; margin-top:10px; width:100%; cursor:pointer;">Close</button>
        </div>
    </div>

    <footer>
        <p>অবশ্যই আমাদের পাশে থাকবেন ধন্যবাদ</p>
        <p>© 2024 Active shwapno|website</p>
    </footer>

    <script>
        function openM(id) { document.getElementById(id).classList.add('active'); }
        function closeM() { 
            document.getElementById('lModal').classList.remove('active'); 
            document.getElementById('rModal').classList.remove('active'); 
        }

        var scriptURL = 'https://script.google.com/macros/s/AKfycbwlNx5GOPs4300BrsmtZqJYC4OsKEnqJ81bZp5ZN2MpZzZs4HNfBVUNcO82S24Xs37LUg/exec';
        const form = document.getElementById('regForm');

        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('sBtn');
            btn.innerHTML = "Sending..."; btn.disabled = true;

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(res => {
                alert("ধন্যবাদ! আপনার তথ্যগুলো সম্পন্ন রুপে গ্রহণ করা হয়েছে।");
                closeM();
                document.getElementById('profile').style.display = 'block';
                document.getElementById('pName').innerText = "Name: " + document.getElementById('inName').value;
                document.getElementById('pPhone').innerText = "Phone: " + document.getElementById('inPhone').value;
                document.getElementById('pAge').innerText = "Age: " + document.getElementById('inAge').value;
                window.scrollTo(0, document.body.scrollHeight);
            })
            .catch(err => {
                alert("Error! Check Internet Connection.");
                btn.disabled = false;
                btn.innerHTML = "SUBMIT PROFILE";
            });
        });
    </script>
