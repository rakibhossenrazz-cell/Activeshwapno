    <div class="hero">
        <h1>আমাদের সেবা সমূহ</h1>
        <p>সঞ্চয় সেবা সম্পর্কে জানতে চান?
প্রত্যেক মানুষেরই ভবিষ্যৎ সুরক্ষার বিষয়টি বিবেচনা করে নিয়মিত সঞ্চয় করা উচিত। বুরো বাংলাদেশে ভর্তি হয়ে সদস্য/গ্রাহকগণ নিয়মিত সঞ্চয়ের মাধ্যমে ক্ষুদ্র/বৃহৎ আয়বর্ধক প্রকল্পে বিনিয়োগ, স্বাস্থ্য পরিচর্যা, সন্তানের শিক্ষা ব্যয়, গৃহ নির্মাণ এবং অন্যান্য অতি প্রয়োজনীয় খাতে বিনিয়োগ করার জন্য ছোটো অথবা বড় আকারের পুঁজি গঠন করতে পারেন। বুরো বাংলাদেশ তার সকল সদস্য/গ্রাহককে উন্মুক্ত সঞ্চয় সুবিধার মাধ্যমে মূল্যবান সেবা প্রদান করে এবং বুরো বাংলাদেশে জমাকৃত যেকোনো সঞ্চয় সহজে উত্তোলনযোগ্য।

বুরো বাংলাদেশ সদস্য/গ্রাহকের জন্য নিম্নে বর্ণিত সঞ্চয় সেবাসমূহ প্রদান করে থাকে:
(১) সাধারণ সঞ্চয় (General Savings)
(২) স্বেচ্ছা সঞ্চয় (Voluntary Savings)
(৩) মেয়াদি সঞ্চয় (Contractual Savings)
(১) সাধারণ সঞ্চয় (General Savings)

সকল ধরনের সদস্য/গ্রাহককে সংস্থার সদস্যপদ গ্রহণের সময় একটি সাধারণ সঞ্চয় হিসাব খুলতে হবে। সদস্য/গ্রাহককের সাধারণ সঞ্চয় জমার উপর বার্ষিক ৬% হারে লভ্যাংশ প্রদান করা হয়। ভর্তিকৃত সদস্য/গ্রাহক সর্বনিম্ন ২০ টাকা জমা প্রদান করে মাসিক/সাপ্তাহিক ভিত্তিতে সাধারণ সঞ্চয় জমা করতে পারেন।

(২) স্বেচ্ছা সঞ্চয় (Voluntary Savings)
স্বেচ্ছা সঞ্চয় হিসাবে সকল সদস্য/গ্রাহকগণ একাধিক সঞ্চয় হিসাব খুলতে পারবেন। সাপ্তাহিক ও মাসিক ভিত্তিতে যেকোনো পরিমাণ টাকা জমা প্রদান করা যাবে। ৩ বৎসর মেয়াদি স্বেচ্ছা সঞ্চয়ে সদস্যের সঞ্চয় জমার উপর বার্ষিক ৭.০০% লাভ প্রদান করা হয়।

(৩) মেয়াদি সঞ্চয় (Contractual Savings)
মেয়াদি সঞ্চয় হিসাবে সকল সদস্য/গ্রাহকগণ সাপ্তাহিক অথবা মাসিক কিস্তির মাধ্যমে নির্দিষ্ট মেয়াদ পূর্ণ করে সঞ্চয় করতে পারবেন। এক্ষেত্রে ৩ বৎসর মেয়াদি সঞ্চয়ের জন্য বার্ষিক ৭% হারে, ৫ বৎসর মেয়াদি সঞ্চয়ের জন্য ৮% হারে এবং ১০ বৎসর মেয়াদি সঞ্চয়ের জন্য ১০% হারে লাভ প্রদান করা হয়।</p>
        
        <h2>আমাদের লক্ষ্য</h2>
